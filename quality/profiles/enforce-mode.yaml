# Enforce mode configuration overlay
# Apply by setting QUALITY_GATE_MODE=enforce or copying to quality-gate.yaml
mode: enforce
notify:
  terminal_feedback: true
  ui_badge: true
  block_progression: true
thresholds:
  max_critical: 0
  max_major: 0
  min_coverage_delta: 0.0
required_checks:
  - basic-checks
  - quality-gate
  - frontend-check
