# Warn mode configuration overlay
# Apply by setting QUALITY_GATE_MODE=warn or copying to quality-gate.yaml
mode: warn
notify:
  terminal_feedback: true
  ui_badge: true
  block_progression: false
thresholds:
  # Same thresholds as enforce, but only warn
  max_critical: 0
  max_major: 5
  min_coverage_delta: -2.0
